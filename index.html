<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Security: Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://maps.googleapis.com https://generativelanguage.googleapis.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://maps.gstatic.com https://lh3.googleusercontent.com blob: data:; connect-src 'self' https://generativelanguage.googleapis.com https://*.firebaseio.com https://*.googleapis.com;">

  <title>ARIA — Arena Real-time Intelligence Assistant</title>
  <meta name="description" content="ARIA is your AI-powered stadium concierge, providing real-time crowd density alerts, food wait times, and step-by-step wayfinding for a premium sports experience.">
  
  <!-- Theme & PWA -->
  <meta name="theme-color" content="#b0c6ff">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">

  <!-- Social Media: Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://aria.stadium.app/">
  <meta property="og:title" content="ARIA — Arena Real-time Intelligence Assistant">
  <meta property="og:description" content="AI-powered stadium wayfinding and crowd intelligence. Feel like a VIP in every section.">
  <meta property="og:image" content="/icons/og-image.png">

  <!-- Social Media: Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="ARIA — Arena Real-time Intelligence Assistant">
  <meta property="twitter:description" content="Navigate the stadium with real-time AI and crowd density tracking.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body class="app-shell">
  
  <header>
    <nav aria-label="Main navigation" style="padding: var(--spacing-md); display: flex; align-items: center; justify-content: space-between;">
      <div class="logo" style="font-family: var(--font-display); font-weight: 700; color: var(--color-primary); font-size: 1.25rem;">
        ARIA
      </div>
      <div style="display: flex; gap: var(--spacing-sm); align-items: center;">
        <select id="lang-selector" aria-label="Select Language" class="chip" style="background: var(--color-surface-high); border: none; color: white;">
          <option value="en">EN</option>
          <option value="hi">HI</option>
          <option value="es">ES</option>
          <option value="fr">FR</option>
        </select>
        <div id="connection-status" class="badge badge-primary" role="status">Online</div>
      </div>
    </nav>
  </header>

  <main id="app-container" aria-live="polite" aria-atomic="true">
    <!-- Screen Router Injection Point -->
    <div id="screen-outlet" class="screen">
      <!-- Default state: Loading -->
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh;">
          <div role="progressbar" aria-label="Loading application" style="width: 40px; height: 40px; border: 4px solid var(--color-surface-high); border-top-color: var(--color-primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
      </div>
    </div>
  </main>

  <!-- Global Floating Components -->
  <button id="concierge-trigger" class="concierge-trigger" aria-label="Ask ARIA AI Assistant">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="margin-right: 8px;">
      <path d="M12 2L13.8 8.2L20 10L13.8 11.8L12 18L10.2 11.8L4 10L10.2 8.2L12 2Z" fill="white"/>
    </svg>
    <span style="font-weight: 700; font-size: 0.875rem; color: white;">ASK ARIA</span>
  </button>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/app.js" type="module"></script>
</body>
</html>
